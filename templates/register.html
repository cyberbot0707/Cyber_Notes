{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center animate-content mt-5">
    <div class="col-md-4">
        <div class="card card-custom p-4 shadow-lg border-0" style="background: var(--card-bg);">
            <div class="text-center mb-4">
                <i class="bi bi-person-plus text-success" style="font-size: 3rem;"></i>
                <h3 class="fw-bold mt-2">Регистрация</h3>
                <p class="text-secondary small">Создайте новый защищенный аккаунт</p>
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label text-secondary small fw-bold">Придумайте логин</label>
                    <input type="text" name="username" class="form-control bg-dark border-secondary text-white" placeholder="Напр: agent_007" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-secondary small fw-bold">Надежный пароль</label>
                    <input type="password" name="password" class="form-control bg-dark border-secondary text-white" placeholder="••••••••" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-secondary small fw-bold">Код восстановления (Секретное слово)</label>
                    <input type="text" name="recovery_code" class="form-control bg-dark border-secondary text-white" placeholder="Напр: кличка питомца" required>
                    <div class="form-text text-secondary opacity-75" style="font-size: 0.75rem;">Понадобится, если вы забудете пароль</div>
                </div>

                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn btn-success w-50 py-2 fw-bold border-0" style="background-color: #10b981;">Создать</button>
                    <a href="{{ url_for('login') }}" class="btn btn-outline-secondary w-50 py-2 fw-bold d-flex align-items-center justify-content-center text-decoration-none">
                        Вход
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
