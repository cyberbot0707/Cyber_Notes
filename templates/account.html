{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center animate-content mt-4">
    <div class="col-md-8 col-lg-6">

        <div class="card card-custom shadow-sm border-secondary border-opacity-25 p-4 mb-4">
            <h4 class="mb-4 fw-bold d-flex align-items-center">
                <i class="bi bi-gear-fill text-warning me-2 fs-3"></i>
                Настройки профиля
            </h4>

            <div class="mb-4">
                <label class="form-label text-secondary small fw-bold">Имя пользователя (Логин)</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="bi bi-person-fill"></i></span>
                    <input type="text" class="form-control bg-transparent border-secondary fw-bold" style="color: var(--text-color);" value="{{ user.username }}" readonly disabled>
                </div>
            </div>

            <div class="card bg-transparent border-secondary border-opacity-50 mb-4 p-3 shadow-sm rounded-3">
                <h6 class="fw-bold mb-3 d-flex align-items-center">
                    <i class="bi bi-key-fill text-warning me-2 fs-5"></i>Сменить пароль
                </h6>
                <form action="{{ url_for('account') }}" method="POST">
                    <input type="hidden" name="action" value="change_password">

                    <div class="mb-3">
                        <input type="password" name="old_password" class="form-control bg-transparent border-secondary" style="color: var(--text-color);" placeholder="Введите текущий пароль" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" name="new_password" class="form-control bg-transparent border-secondary" style="color: var(--text-color);" placeholder="Придумайте новый пароль" required>
                    </div>
                    <button type="submit" class="btn btn-outline-warning btn-sm rounded-pill px-4 fw-bold">
                        Обновить пароль
                    </button>
                </form>
            </div>

            <div class="card bg-transparent border-secondary border-opacity-50 mb-4 p-3 shadow-sm rounded-3">
                <h6 class="fw-bold mb-2 d-flex align-items-center">
                    <i class="bi bi-shield-lock-fill text-success me-2 fs-5"></i>Код восстановления
                </h6>
                <p class="text-secondary small mb-3">Ваш текущий код: <span class="badge bg-secondary rounded-pill px-2 py-1 ms-1">{{ user.recovery_code }}</span></p>

                <form action="{{ url_for('account') }}" method="POST">
                    <input type="hidden" name="action" value="change_recovery">

                    <div class="mb-3">
                        <input type="password" name="password_for_recovery" class="form-control bg-transparent border-secondary" style="color: var(--text-color);" placeholder="Пароль от аккаунта (для подтверждения)" required>
                    </div>
                    <div class="mb-3">
                        <input type="text" name="new_recovery_code" class="form-control bg-transparent border-secondary" style="color: var(--text-color);" placeholder="Новое секретное слово" required autocomplete="off">
                    </div>
                    <button type="submit" class="btn btn-outline-success btn-sm rounded-pill px-4 fw-bold">
                        Сохранить новый код
                    </button>
                </form>
            </div>

            <div class="d-flex flex-column flex-sm-row justify-content-between gap-3 mt-4 pt-3 border-top border-secondary border-opacity-25">
                <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary rounded-pill px-4 fw-bold">
                    <i class="bi bi-arrow-left me-1"></i> Вернуться в сейф
                </a>
                <a href="{{ url_for('logout') }}" class="btn btn-outline-danger rounded-pill px-4 fw-bold">
                    <i class="bi bi-box-arrow-right me-1"></i> Выйти из системы
                </a>
            </div>

        </div>

    </div>
</div>
{% endblock %}
