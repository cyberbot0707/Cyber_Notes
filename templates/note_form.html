{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card card-custom p-4 p-md-5">
            <div class="d-flex align-items-center mb-4">
                <a href="{{ url_for('dashboard') }}" class="btn btn-link text-secondary p-0 me-3"><i class="bi bi-arrow-left fs-4"></i></a>
                <h3 class="mb-0 fw-bold">{{ title_page }}</h3>
            </div>

            <form method="POST">
                <div class="row g-3 mb-4">
                    <div class="col-md-8">
                        <label class="form-label text-secondary small text-uppercase fw-bold">Заголовок</label>
                        <input type="text" name="title" class="form-control form-control-lg fs-5" value="{{ note.get('title', '') }}" placeholder="О чем эта заметка?">
                    </div>


                    <div class="col-md-4">
                        <label class="form-label text-secondary small text-uppercase fw-bold">Тег</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 border-secondary border-opacity-10"><i class="bi bi-hash text-secondary"></i></span>


                            <input type="text" name="tag" class="form-control border-start-0 ps-0" value="{{ note.get('tag', 'Общее') }}" list="tagList" placeholder="Выберите или введите" autocomplete="off">

                            <datalist id="tagList">
                                <option value="Общее">
                                <option value="Секретно">
                                <option value="Личное">
                                <option value="Пароли">
                                <option value="Работа">
                                <option value="Финансы">
                            </datalist>
                        </div>
                    </div>


                </div>

                <div class="mb-4">
                    <label class="form-label text-secondary small text-uppercase fw-bold">Секретное содержимое</label>
                    <textarea name="content" class="form-control font-monospace" rows="12" placeholder="Начните вводить текст..." style="resize: vertical;">{{ note.get('content', '') }}</textarea>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary px-4">Отмена</a>
                    <button type="submit" class="btn btn-primary px-4"><i class="bi bi-shield-check me-2"></i>Зашифровать и сохранить</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
