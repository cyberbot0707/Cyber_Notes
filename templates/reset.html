{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center animate-content mt-5">
    <div class="col-md-4">
        <div class="card card-custom p-4 shadow-lg border-0" style="background: var(--card-bg);">
            <div class="text-center mb-4">
                <i class="bi bi-key text-warning" style="font-size: 3rem;"></i>
                <h3 class="fw-bold mt-2">Сброс пароля</h3>
                <p class="text-secondary small">Для сброса необходимо пройти проверку</p>
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label text-secondary small fw-bold">Ваш логин</label>
                    <input type="text" name="username" class="form-control bg-dark border-secondary text-white" placeholder="Напр: agent_007" required>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold text-warning">Старый пароль ИЛИ Код восстановления</label>
                    <input type="text" name="verification" class="form-control bg-dark border-warning text-white shadow-sm" placeholder="Подтвердите личность" required>
                </div>

                <div class="mb-4">
                    <label class="form-label text-secondary small fw-bold">Новый пароль</label>
                    <input type="password" name="new_password" class="form-control bg-dark border-secondary text-white" placeholder="••••••••" required>
                </div>

                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn btn-warning w-50 py-2 fw-bold border-0 text-dark">Сбросить</button>
                    <a href="{{ url_for('login') }}" class="btn btn-outline-secondary w-50 py-2 fw-bold d-flex align-items-center justify-content-center text-decoration-none">
                        Отмена
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
